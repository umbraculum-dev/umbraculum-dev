name: docs-readmes

# Gates module-README structural + link checkers and public-docs policy scripts.
# Job body delegated to @umbraculum/ci-parity (three Python commands in manifest).
# See docs/CI-PARITY.md and docs/DOCS-README-STANDARDS.md.

on:
  push:
    branches: [master]
    paths:
      - "**/README.md"
      - "docs/**"
      - "scripts/docs/**"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/ci-parity-reusable.yml"
      - ".github/workflows/docs-readmes.yml"
  pull_request:
    branches: [master]
    paths:
      - "**/README.md"
      - "docs/**"
      - "scripts/docs/**"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/ci-parity-reusable.yml"
      - ".github/workflows/docs-readmes.yml"
  workflow_dispatch:

concurrency:
  group: docs-readmes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-module-readmes:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    uses: ./.github/workflows/ci-parity-reusable.yml
    with:
      jobs: docs-readmes
      ci_parity_version: "1.0.0"
      manifest_path: .umbraculum/ci-parity.json
