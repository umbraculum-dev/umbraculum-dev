name: web-lint

# Gates ESLint on every PR that could affect web app, shared UI packages, or
# the ESLint config itself. Runs in a node:20-slim container so the
# "no npm on host" policy is honored end-to-end (see
# `.cursor/rules/00-shared-node-npm-container-only.mdc`,
# `docs/TESTING.md`, and `docs/LINTING.md`).
#
# Scope is currently HIGH-LIGHT (per `docs/LINTING.md`):
#   - `npm run lint` (full repo): errors block CI, warnings tolerated.
#     Used to surface ongoing drift to PR authors.
#   - `npm run lint:packages-strict` (gated packages): runs with
#     `--max-warnings 0` on 9 of 11 packages (excluding `beerjson` and
#     `contracts`, which are HIGH-staged Phase 1 cleanup targets).
#     Any new warning in these packages blocks merge.
#   - The canonical guardrail is `no-restricted-imports` on cross-platform
#     UI (`packages/ui/src/{ai,charts}/**`) to forbid raw `tamagui`
#     Button/Input/Checkbox imports (see docs/LINTING.md, "Why Medium").

on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "apps/native/**"
      - "packages/**"
      - "services/api/src/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-lint.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/web/**"
      - "apps/native/**"
      - "packages/**"
      - "services/api/src/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-lint.yml"
  workflow_dispatch:

concurrency:
  group: web-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run ESLint inside node:20-slim
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            node:20-slim \
            bash -lc "
              set -e
              npm install --no-audit --no-fund --workspaces --include-workspace-root
              echo '--- full lint (errors block; warnings reported) ---'
              npm run lint
              echo '--- strict gate on packages/** (no warnings tolerated) ---'
              npm run lint:packages-strict
            "
