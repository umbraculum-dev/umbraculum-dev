name: web-lint

# Gates ESLint on every PR that could affect web app, shared UI packages, or
# the ESLint config itself. Job body delegated to @umbraculum/ci-parity.
# See docs/CI-PARITY.md and docs/LINTING.md.

on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "apps/native/**"
      - "packages/**"
      - "services/api/src/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/web-lint.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/web/**"
      - "apps/native/**"
      - "packages/**"
      - "services/api/src/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/web-lint.yml"
  workflow_dispatch:

concurrency:
  group: web-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    uses: umbraculum-dev/umbraculum-toolset/.github/workflows/ci-parity-reusable.yml@ci-parity-v1.0.0
    with:
      jobs: lint
      ci_parity_version: "1.0.0"
      manifest_path: .umbraculum/ci-parity.json
