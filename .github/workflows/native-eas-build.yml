# Manual EAS internal builds for July 2026 brewery alpha (non-blocking on PRs).
# Expo Free plan: ~30 cloud builds/month (≤15 Android + ≤15 iOS), 1 concurrency,
# slow free-tier queue (30–90+ min common) — acceptable for occasional demo APKs;
# see apps/native/EAS-DEMO-SETUP.md § "Expo free tier". Prefer this workflow
# when the repo is public (standard ubuntu-latest: no minute billing). While the
# repo is private, long queue waits burn Actions minutes — prefer local eas build.
name: native-eas-build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "android | ios | all"
        required: true
        default: "android"
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"

jobs:
  eas-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: ./scripts/build-packages-in-docker.sh

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (Android)
        if: inputs.platform == 'android' || inputs.platform == 'all'
        working-directory: apps/native/brewery
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: EAS build (iOS)
        if: inputs.platform == 'ios' || inputs.platform == 'all'
        working-directory: apps/native/brewery
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive
