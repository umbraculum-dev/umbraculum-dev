name: native-deps

# Lean guardrail for apps/native: verifies dependency alignment with the
# installed Expo SDK (so Expo Go ABI matches at runtime) and that apps/native
# still type-checks. Intentionally no emulators, no macOS runners, no app
# builds. See docs/NATIVE-STRATEGY-AND-CI.md for the full rationale.

on:
  push:
    branches: [master]
    paths:
      - "apps/native/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/native-deps.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/native/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/native-deps.yml"
  workflow_dispatch:

concurrency:
  group: native-deps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Honor [skip ci] / [ci skip] in commit subject or body for manual override.
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run expo install --check + apps/native/brewery typecheck (Docker, matches local rule)
        # RFC-0011 Wave 4A: apps/native/brewery is a workspace; expo is hoisted to repo
        # root — install at /repo first, then npx expo from the brewery workspace.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            node:20-slim \
            bash -lc "npm ci --no-audit --no-fund && cd apps/native/brewery && npx expo install --check && npm run typecheck"
