name: integrator-live-smoke

# Live integrator smoke: cookie (curl) + bearer (published npm + api-client facades).
# Requires docker compose stack + migrate deploy + db:seed + seed:e2e. Not a ci-parity job (~4.5 min).
# Opt-in only: PR label run-integrator-smoke (paths: scripts/integrator-*) or workflow_dispatch.
# No automatic push, pull_request-without-label, or schedule triggers.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [master]
    paths:
      - "scripts/integrator-*"
      - ".github/workflows/integrator-live-smoke.yml"
  workflow_dispatch:

concurrency:
  group: integrator-live-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrator-live-smoke:
    if: |
      (
        github.event_name == 'workflow_dispatch' ||
        contains(toJSON(github.event.pull_request.labels.*.name), 'run-integrator-smoke')
      ) &&
      (
        github.event_name != 'pull_request' ||
        (
          !contains(github.event.pull_request.title, '[skip ci]') &&
          !contains(github.event.pull_request.title, '[ci skip]')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start stack and run integrator smoke
        env:
          UMBRACULUM_BASE_URL: http://localhost:18080
        run: |
          set -euo pipefail
          ./scripts/integrator-live-bootstrap.sh
          ./scripts/integrator-api-smoke.sh "${UMBRACULUM_BASE_URL}"
          ./scripts/integrator-bearer-npm-smoke.sh

      - name: Tear down stack
        if: always()
        run: docker compose down --remove-orphans
