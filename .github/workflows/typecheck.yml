name: typecheck

# Gates `tsc --noEmit` across the 15 currently-clean TS workspaces.
# Job body delegated to @umbraculum/ci-parity (manifest: .umbraculum/ci-parity.json).
# See docs/CI-PARITY.md and docs/TYPING.md.

on:
  push:
    branches: [master]
    paths:
      - "apps/native/**"
      - "apps/web/e2e/**"
      - "services/api/**"
      - "packages/**"
      - "**/tsconfig*.json"
      - "package.json"
      - "package-lock.json"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/typecheck.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/native/**"
      - "apps/web/e2e/**"
      - "services/api/**"
      - "packages/**"
      - "**/tsconfig*.json"
      - "package.json"
      - "package-lock.json"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/typecheck.yml"
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    uses: umbraculum-dev/umbraculum-toolset/.github/workflows/ci-parity-reusable.yml@ci-parity-v1.0.0
    with:
      jobs: typecheck
      ci_parity_version: "1.0.0"
      manifest_path: .umbraculum/ci-parity.json
