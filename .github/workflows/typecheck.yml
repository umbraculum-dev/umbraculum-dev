name: typecheck

# Gates `tsc --noEmit` across the 15 currently-clean TS workspaces on every PR
# that could affect TypeScript sources. Runs inside a single node:20-slim
# container that hoists /repo/node_modules — the same method used by
# native-deps.yml (and documented in docs/TYPING.md as the canonical
# measurement method).
#
# Scope (per docs/TYPING.md):
#   - 15 workspaces are gated. apps/web is EXCLUDED by explicit decision
#     (Phase 4 — its 585 errors are all in the Tamagui shorthand-prop /
#     theme-token accepted-cost class per docs/TAMAGUI.md; gating them
#     produces no signal and harms future Tamagui upgrades).
#   - packages/ui is similarly excluded (25 errors in the same Tamagui class).
#   - packages/core is JavaScript-only (no tsconfig.json); not in scope.
#
# Failure aggregation: each workspace's typecheck runs sequentially under
# `set +e` so all 15 results are reported even if early workspaces fail.
# The job exits non-zero if any single workspace produced errors.

on:
  push:
    branches: [master]
    paths:
      - "apps/native/**"
      - "apps/web/e2e/**"
      - "services/api/**"
      - "packages/**"
      - "**/tsconfig*.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typecheck.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/native/**"
      - "apps/web/e2e/**"
      - "services/api/**"
      - "packages/**"
      - "**/tsconfig*.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typecheck.yml"
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run tsc --noEmit across the 15 clean workspaces
        # Single node:20-slim container hoists /repo/node_modules once
        # (matches the canonical measurement method documented in
        # docs/TYPING.md §Methodology). apps/web + packages/ui are
        # excluded by explicit Phase 4 decision (Tamagui-accepted cost).
        # services/api/prisma is not an npm workspace (only a tsconfig)
        # so it gets a direct tsc invocation.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            node:20-slim \
            bash -lc '
              set -eu
              # Transient registry blips (ECONNRESET) are common on CI; npm fetch
              # retries plus a bounded shell retry avoid false-red typecheck runs.
              npm config set fetch-retries 5
              npm config set fetch-retry-mintimeout 20000
              npm config set fetch-retry-maxtimeout 120000

              run_with_retry() {
                local attempt=1
                local max=3
                while [ "$attempt" -le "$max" ]; do
                  if "$@"; then
                    return 0
                  fi
                  if [ "$attempt" -eq "$max" ]; then
                    return 1
                  fi
                  echo "Command failed (attempt ${attempt}/${max}); retrying in $((attempt * 15))s..."
                  sleep $((attempt * 15))
                  attempt=$((attempt + 1))
                done
              }

              run_with_retry npm ci --no-audit --no-fund --workspaces --include-workspace-root

              # apps/web/e2e is a *nested* workspace (apps/web/e2e/) and the
              # root `workspaces: ["apps/*", "services/*", "packages/*"]` glob
              # only matches one level deep, so the root ci above does NOT
              # install its devDependencies (@playwright/test, @axe-core/
              # playwright, axe-core). The e2e workspace is also intentionally
              # isolated per apps/web/e2e/README.md (playwright + browser
              # binaries live in the mcr.microsoft.com/playwright:* image),
              # so adding it to the root workspaces array would pollute the
              # root install. Instead, do an explicit local install here so
              # `tsc --noEmit` can resolve @playwright/test and friends.
              #
              # This surfaced 2026-05-19 (slot-7 push) when CI typecheck began
              # reporting TS2307 "Cannot find module @playwright/test" across
              # every e2e spec — the bug had been latent since aab5b41
              # (2026-05-18) when this workflow first listed apps/web/e2e.
              # Local reproductions kept passing because developer hosts have
              # stale apps/web/e2e/node_modules from prior manual installs
              # bind-mounted into the container. CI starts clean and the gap
              # surfaces immediately. See docs/TYPING.md "CI vs local install
              # gap (apps/web/e2e)" for the operator guidance.
              run_with_retry bash -lc "cd apps/web/e2e && npm ci --no-audit --no-fund"

              export PATH="/repo/node_modules/.bin:$PATH"

              # Workspaces invoked via `npm run typecheck` from their dir.
              # services/api/prisma is invoked via direct tsc because it
              # has only a tsconfig, no package.json.
              workspaces=(
                "services/api"
                "services/api/prisma|tsc"
                "apps/native"
                "apps/web/e2e"
                "packages/api-client"
                "packages/automation-contracts"
                "packages/beerjson"
                "packages/contracts"
                "packages/module-sdk"
                "packages/i18n"
                "packages/i18n-react"
                "packages/media"
                "packages/navigation"
                "packages/recipes-ui"
                "packages/test-mcp"
              )

              set +e
              failed=()
              for entry in "${workspaces[@]}"; do
                ws="${entry%%|*}"
                mode="${entry#*|}"
                if [ "$mode" = "$entry" ]; then mode="npm"; fi
                echo ""
                echo "=== $ws ==="
                cd "/repo/$ws"
                if [ "$mode" = "tsc" ]; then
                  /repo/node_modules/.bin/tsc -p tsconfig.json --noEmit
                else
                  npm run typecheck --silent
                fi
                rc=$?
                if [ $rc -ne 0 ]; then
                  echo "FAIL: $ws (exit $rc)"
                  failed+=("$ws")
                else
                  echo "OK:   $ws"
                fi
                cd /repo
              done

              echo ""
              echo "=== Summary ==="
              if [ ${#failed[@]} -eq 0 ]; then
                echo "All 15 workspaces typecheck clean."
                exit 0
              else
                echo "Failed workspaces (${#failed[@]}):"
                for ws in "${failed[@]}"; do echo "  - $ws"; done
                exit 1
              fi
            '
