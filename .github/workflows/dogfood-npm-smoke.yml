name: dogfood-npm-smoke

# Registry-only install smoke for published @umbraculum/* SDK packages (contracts,
# api-client, module-sdk α batch). Manifest job: .umbraculum/ci-parity.json → dogfood-npm-smoke

on:
  push:
    branches: [master]
    paths:
      - "packages/platform/contracts/**"
      - "packages/platform/api-client/**"
      - "packages/modules/ai-tool-sdk/**"
      - "packages/modules/i18n-keys/**"
      - "packages/modules/module-sdk/**"
      - "packages/*-contracts/**"
      - "apps/web/package.json"
      - "apps/native/package.json"
      - "services/api/package.json"
      - "packages/platform/rendering/package.json"
      - "scripts/dogfood-npm-smoke.sh"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/dogfood-npm-smoke.yml"
      - ".github/workflows/ci-parity-reusable.yml"
  pull_request:
    branches: [master]
    paths:
      - "packages/platform/contracts/**"
      - "packages/platform/api-client/**"
      - "packages/modules/ai-tool-sdk/**"
      - "packages/modules/i18n-keys/**"
      - "packages/modules/module-sdk/**"
      - "packages/*-contracts/**"
      - "apps/web/package.json"
      - "apps/native/package.json"
      - "services/api/package.json"
      - "packages/platform/rendering/package.json"
      - "scripts/dogfood-npm-smoke.sh"
      - ".umbraculum/ci-parity.json"
      - ".github/workflows/dogfood-npm-smoke.yml"
      - ".github/workflows/ci-parity-reusable.yml"
  workflow_dispatch:
  schedule:
    # Weekly registry drift signal (published semver still installs)
    - cron: "0 6 * * 1"

concurrency:
  group: dogfood-npm-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dogfood-npm-smoke:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    uses: ./.github/workflows/ci-parity-reusable.yml
    with:
      jobs: dogfood-npm-smoke
      ci_parity_version: "1.0.11"
      manifest_path: .umbraculum/ci-parity.json
