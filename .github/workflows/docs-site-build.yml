name: docs-site-build

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "**/README.md"
      - ".github/workflows/docs-site-build.yml"
  pull_request:
    branches: [master]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "**/README.md"
      - ".github/workflows/docs-site-build.yml"
  workflow_dispatch:

# Rapid successive pushes to master cancel the in-progress run (expected).
# A run that ends with "The operation was canceled" after ~2m with only
# docsDir/blogDir warnings — not a Docusaurus failure. Check the latest run
# for the tip commit; re-run manually via workflow_dispatch if needed.
concurrency:
  group: docs-site-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs-site:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Checkout umbraculum-brochure (announcement package)
        uses: actions/checkout@v5
        with:
          repository: umbraculum-dev/umbraculum-brochure
          path: ../umbraculum-brochure
          ref: v0.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build docs-site
        run: npm run build -w @umbraculum/docs-site
