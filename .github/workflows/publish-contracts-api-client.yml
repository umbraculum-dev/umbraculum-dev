name: publish-contracts-api-client

# Publishes MIT SDK packages on sdk-contracts-v* tags:
#   @umbraculum/contracts, @umbraculum/api-client,
#   @umbraculum/brewery-contracts, @umbraculum/brewery-api-client
#
# Skips a package when its package.json version is already on the registry (403-safe bumps).
# Separate from publish-sdk-batch.yml (seven-package α batch).
#
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN.
# First-time packages: maintainer laptop publish + npm trust CLI — see
# docs/design/npm-sdk-trusted-publishing.md.

on:
  push:
    tags:
      - "sdk-contracts-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install npm with OIDC trusted publishing support (>= 11.5.1)
        run: npm install -g npm@11.6.2 && npm --version

      - run: npm ci
      - run: npm run build:packages
      - run: npm run test:packages

      - name: Publish contracts SDK batch to npm (OIDC)
        env:
          CONTRACTS_ESCAPED: "@umbraculum%2fcontracts"
          API_CLIENT_ESCAPED: "@umbraculum%2fapi-client"
          BREWERY_CONTRACTS_ESCAPED: "@umbraculum%2fbrewery-contracts"
          BREWERY_API_CLIENT_ESCAPED: "@umbraculum%2fbrewery-api-client"
        run: |
          set -euo pipefail

          publish_npm_oidc() {
            local PKG_DIR="$1"
            local PKG_ESCAPED="$2"
            local PKG_LABEL="$3"

            echo "::group::Publish ${PKG_LABEL} from ${PKG_DIR}"

            if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
              echo "::error::Missing ACTIONS_ID_TOKEN_* env — job needs permissions.id-token: write"
              exit 1
            fi

            OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org"
            ID_TOKEN=$(curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              -H "Accept: application/json" \
              "${OIDC_URL}" | jq -r .value)
            if [ -z "${ID_TOKEN}" ] || [ "${ID_TOKEN}" = "null" ]; then
              echo "::error::GitHub OIDC response missing .value for ${PKG_LABEL}"
              exit 1
            fi

            echo "OIDC payload claims for ${PKG_LABEL}:"
            echo "${ID_TOKEN}" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null \
              | jq '{sub, repository, repository_owner, workflow, workflow_ref, ref, environment, job_workflow_ref}' \
              || true

            EXCHANGE_URL="https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${PKG_ESCAPED}"
            HTTP_CODE=$(curl -sS -o /tmp/exchange.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${ID_TOKEN}" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              "${EXCHANGE_URL}")
            echo "Exchange HTTP ${HTTP_CODE} for ${PKG_LABEL}"
            cat /tmp/exchange.json || true
            echo
            if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "201" ]; then
              echo "::error::npm OIDC token exchange failed for ${PKG_LABEL} (HTTP ${HTTP_CODE}) — verify trusted publisher at https://www.npmjs.com/package/${PKG_LABEL}/access"
              exit 1
            fi

            NPM_TOKEN=$(jq -r .token < /tmp/exchange.json)
            if [ -z "${NPM_TOKEN}" ] || [ "${NPM_TOKEN}" = "null" ]; then
              echo "::error::npm exchange response missing .token for ${PKG_LABEL}"
              exit 1
            fi

            cat > "$HOME/.npmrc" <<EOF
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF

            unset NODE_AUTH_TOKEN
            (cd "${PKG_DIR}" && npm publish --access public)
            echo "::endgroup::"
          }

          publish_npm_oidc_skip_if_exists() {
            local PKG_DIR="$1"
            local PKG_ESCAPED="$2"
            local PKG_LABEL="$3"
            local VERSION
            VERSION="$(jq -r .version "${PKG_DIR}/package.json")"
            if npm view "${PKG_LABEL}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skip ${PKG_LABEL}@${VERSION} — already on registry"
              return 0
            fi
            publish_npm_oidc "${PKG_DIR}" "${PKG_ESCAPED}" "${PKG_LABEL}"
          }

          publish_npm_oidc_skip_if_exists packages/platform/contracts "${CONTRACTS_ESCAPED}" "@umbraculum/contracts"

          cp packages/platform/api-client/package.json /tmp/api-client-package.json.bak
          echo "Rewriting api-client dependencies to registry semver for publish tarball only"
          jq '.dependencies["@umbraculum/contracts"] = "^0.0.1" | .dependencies["@umbraculum/automation-contracts"] = "^0.0.2" | .dependencies["@umbraculum/pim-contracts"] = "^0.0.2" | .dependencies["@umbraculum/mrp-contracts"] = "^0.0.2" | .dependencies["@umbraculum/crp-contracts"] = "^0.0.2"' \
            packages/platform/api-client/package.json > /tmp/api-client-package.json
          mv /tmp/api-client-package.json packages/platform/api-client/package.json

          publish_npm_oidc_skip_if_exists packages/platform/api-client "${API_CLIENT_ESCAPED}" "@umbraculum/api-client"
          mv /tmp/api-client-package.json.bak packages/platform/api-client/package.json

          cp packages/verticals/brewery/contracts/package.json /tmp/brewery-contracts-package.json.bak
          jq '.dependencies["@umbraculum/contracts"] = "^0.0.1"' \
            packages/verticals/brewery/contracts/package.json > /tmp/brewery-contracts-package.json
          mv /tmp/brewery-contracts-package.json packages/verticals/brewery/contracts/package.json

          publish_npm_oidc_skip_if_exists packages/verticals/brewery/contracts "${BREWERY_CONTRACTS_ESCAPED}" "@umbraculum/brewery-contracts"
          mv /tmp/brewery-contracts-package.json.bak packages/verticals/brewery/contracts/package.json

          cp packages/verticals/brewery/api-client/package.json /tmp/brewery-api-client-package.json.bak
          jq '.dependencies["@umbraculum/api-client"] = "^0.0.1" | .dependencies["@umbraculum/brewery-contracts"] = "^0.0.1"' \
            packages/verticals/brewery/api-client/package.json > /tmp/brewery-api-client-package.json
          mv /tmp/brewery-api-client-package.json packages/verticals/brewery/api-client/package.json

          publish_npm_oidc_skip_if_exists packages/verticals/brewery/api-client "${BREWERY_API_CLIENT_ESCAPED}" "@umbraculum/brewery-api-client"
          mv /tmp/brewery-api-client-package.json.bak packages/verticals/brewery/api-client/package.json

      - name: Published versions summary
        run: |
          set -euo pipefail
          for PKG in contracts api-client brewery-contracts brewery-api-client; do
            echo "@umbraculum/${PKG}@$(npm view "@umbraculum/${PKG}" version)"
          done
