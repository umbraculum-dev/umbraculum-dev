server {
  listen 80;
  server_name _;

  # Docker DNS (ensures upstreams re-resolve after container restarts)
  resolver 127.0.0.11 ipv6=off valid=10s;

  set $api_upstream api:4000;
  set $web_upstream web:3000;

  # Proxy API requests to Fastify
  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://$api_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy all other traffic to Next.js
  location / {
    proxy_pass http://$web_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Support websockets / HMR
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

