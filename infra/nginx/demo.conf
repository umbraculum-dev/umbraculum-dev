# demo.umbraculum.dev — internal nginx (TLS terminates in front of this container or on the host).
# Mount as /etc/nginx/conf.d/demo.conf alongside the compose stack on the demo VPS.
# Keep in sync with umbraculum-hosting-demo/nginx/demo.conf

# `map` is only valid in `http` context; conf.d/*.conf is included inside http {}
# from stock nginx.conf, so file-scope here is correct.
map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
  listen 80;
  server_name demo.umbraculum.dev;

  resolver 127.0.0.11 ipv6=off valid=10s;

  set $api_upstream api:4000;
  set $web_upstream web:3000;

  error_page 502 503 =503 /maintenance.html;

  location = /maintenance.html {
    root /etc/nginx/maintenance;
    internal;
    add_header Cache-Control "no-store" always;
  }

  location @api_maintenance {
    default_type application/json;
    add_header Cache-Control "no-store" always;
    return 503 '{"ok":false,"maintenance":true,"message":"Demo redeploy in progress. Retry in a few minutes."}';
  }

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://$api_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /api;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_intercept_errors on;
    error_page 502 503 =503 @api_maintenance;
  }

  location / {
    proxy_pass http://$web_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_intercept_errors on;
  }
}
