##
# Extra pgpool-II config for Brewery app (conservative / mostly-safe).
# This file is appended to the image default config via PGPOOL_USER_CONF_FILE.
##

# Prefer transaction-level load balancing behavior.
statement_level_load_balance = off

# Allow PCP commands from other compose services (used by `db-guard`).
pcp_listen_addresses = '*'

# If a SELECT contains any of these functions, treat it as a write and route to primary.
# (Avoid surprises around sequences, advisory locks, etc.)
black_function_list = 'nextval,setval,currval,lastval,txid_current,txid_current_snapshot,pg_advisory_lock,pg_advisory_xact_lock'

