#
# PostgreSQL Client Authentication Configuration File
#
# This file is mounted into the `postgres` service to allow:
# - normal client connections from other docker compose services
# - streaming replication connections from `postgres-replica`
#

# "local" is for Unix domain socket connections only
local   all             all                                     trust

# IPv4 local connections:
host    all             all             127.0.0.1/32            trust

# IPv6 local connections:
host    all             all             ::1/128                 trust

# Allow client connections from the compose network (password auth)
host    all             all             0.0.0.0/0               md5

# Allow streaming replication from the compose network (password auth)
host    replication     all             0.0.0.0/0               md5

