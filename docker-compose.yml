##
## ============================================================================
## NOT MIGRATED TO THE SHARED TRAEFIK PROXY — and intentionally so (2026-05-11)
## ============================================================================
## This stack is dev-only and does NOT need Traefik. It already runs concurrently
## with any Traefik-migrated Magento stack, with pi-sidecar, and with host
## OpenPLC, because there is zero port overlap (after the :18080 choice below).
##
## Host ports used by this stack:
##   - nginx front-door  -> 18080:80   (see NGINX_HTTP_PORT below; deliberately
##                                     :18080, NOT :8080, to avoid host-OpenPLC's
##                                     :8080 which runs as a systemd service on
##                                     this dev box)
##   - web (Next.js)     -> 3000:3000
##   - api (Fastify)     -> 4000:4000
##   - postgres primary  -> 5432:5432
##   - postgres replica  -> 5433:5432
##   - pgpool            -> 5434:5432
##   - redis             -> 6379:6379
## Plus when running native dev (apps/native, outside this compose):
##   - Expo Metro :8081  (CORS already whitelisted in services/api/src/app.ts)
##   - Expo legacy :19000-19002
##
## Magento stacks own MariaDB :3306..:3322; Traefik owns :443/:80. None of
## those overlap with the ports above.
##
## Tests run entirely inside the docker network (vitest in services/api hits
## DATABASE_URL_TEST against the in-container postgres:5432/brewapp_test).
## No host-port pressure during `npm test`. See services/api/package.json.
##
## Native (apps/native) paths:
##   - iOS Simulator      -> http://localhost:18080 (loopback)
##   - Android Emulator   -> http://10.0.2.2:18080 (auto-rewritten)
##   - Physical device    -> http://<LAN_IP>:18080 (e.g. 192.168.1.124)
## None of these benefit from Traefik (physical devices can't resolve *.docker
## and don't trust the mkcert root CA without per-device installation).
##
## When you would actually want to Traefik-ify this stack (later, optional):
##   - HTTPS-only browser features (Service Workers, Web Crypto subtle, Secure
##     cookies) for Playwright/web tests
##   - iOS Simulator using https://brewery.docker/ with a trusted dev cert
## Migration cost would be ~30 minutes: add `proxy-net` external network +
## Traefik labels on `nginx`, comment out the host port, append `brewery.docker`
## (and any sub-hostnames) to /etc/hosts + _proxy/certs/devca.{crt,key} SANs,
## verify nginx's X-Forwarded-Proto handling matches the Traefik pattern used
## by yamamoto/cmp/etc. (see _proxy/README.md "Magento gotchas").
##
## Cross-references:
##   - ~/dkprojects/_proxy/README.md     (Traefik architecture, hostname table)
##   - ~/dkprojects/_proxy/ROADMAP.md    (migration status per stack)
##   - DEVELOPMENT-LOCAL.md              (local-port + override notes)
##   - docs/DEVELOPMENT-NATIVE-LOCAL.md  (native/Expo workflow)
## ============================================================================
##
services:
  nginx:
    image: nginx:stable
    ports:
      - "${NGINX_HTTP_PORT:-18080}:80"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  web:
    build: ./apps/web
    command: sh -c "mkdir -p /packages && ln -snf /app/node_modules /packages/node_modules && npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      # NOTE: Previously required to bypass npm peer-dependency conflicts when React was pinned to 19.1.0.
      # With React aligned to 19.2.4 (react-native peer range), keep this disabled unless conflicts return.
      # - npm_config_legacy_peer_deps=true
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - ./packages/beerjson:/packages/beerjson:ro
      - ./packages/contracts:/packages/contracts:ro
      - ./packages/core:/packages/core:ro
      - ./packages/i18n:/packages/i18n:ro
      - ./packages/i18n-react:/packages/i18n-react:ro
      - ./packages/media:/packages/media:ro
      - ./packages/navigation:/packages/navigation:ro
      - ./packages/recipes-ui:/packages/recipes-ui:ro
      - ./packages/ui:/packages/ui:ro

  api:
    build: ./services/api
    command: sh -c "npm install && npm run dev"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgpool:5432/brewapp
      - DATABASE_URL_TEST=postgresql://postgres:postgres@postgres:5432/brewapp_test
      - DATABASE_URL_RO=postgresql://postgres:postgres@postgres-replica:5432/brewapp
      - DATABASE_URL_DIRECT=postgresql://postgres:postgres@postgres:5432/brewapp
      - REDIS_URL=redis://redis:6379/0
      - STRIPE_WEBHOOK_SECRET=...
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - pgpool
    volumes:
      - ./services/api:/app
      - ./services/api/node_modules:/app/node_modules
      - ./packages/contracts:/packages/contracts:ro
      - ./packages/core:/packages/core:ro
      - ./packages/media:/packages/media:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  beerproto-sync:
    profiles: ["jobs"]
    build: ./services/api
    command: sh -c "npm install && while true; do npm run job:beerproto-sync; sleep 604800; done"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/brewapp
    depends_on:
      - postgres
    volumes:
      - ./services/api:/app
      - ./services/api/node_modules:/app/node_modules
      - ./packages/contracts:/packages/contracts:ro
      - ./packages/core:/packages/core:ro

  postgres:
    image: postgres:16
    entrypoint: ["/bin/bash", "/primary-entrypoint.sh"]
    command:
      [
        "-c",
        "wal_level=replica",
        "-c",
        "max_wal_senders=10",
        "-c",
        "max_replication_slots=10",
        "-c",
        "archive_mode=on",
        "-c",
        "archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f",
        "-c",
        "max_slot_wal_keep_size=1024MB",
        "-c",
        "hot_standby=on"
      ]
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=brewapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - wal_archive:/wal-archive
      - ./infra/postgres/primary/primary-entrypoint.sh:/primary-entrypoint.sh:ro
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  postgres-replica:
    image: postgres:16
    user: postgres
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    environment:
      - POSTGRES_PASSWORD=postgres
    depends_on:
      - postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata_replica:/var/lib/postgresql/data
      - wal_archive:/wal-archive:ro
      - ./infra/postgres/replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro

  pgpool:
    image: public.ecr.aws/bitnami/pgpool:4.6.3
    environment:
      - PGPOOL_BACKEND_NODES=0:postgres:5432,1:postgres-replica:5432
      - PGPOOL_SR_CHECK_USER=postgres
      - PGPOOL_SR_CHECK_PASSWORD=postgres
      - PGPOOL_POSTGRES_USERNAME=postgres
      - PGPOOL_POSTGRES_PASSWORD=postgres
      - PGPOOL_ADMIN_USERNAME=pgpooladmin
      - PGPOOL_ADMIN_PASSWORD=pgpooladmin
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
      - PGPOOL_DISABLE_LOAD_BALANCE_ON_WRITE=transaction
      - PGPOOL_AUTHENTICATION_METHOD=scram-sha-256
      - PGPOOL_USER_CONF_FILE=/config/pgpool-extra.conf
      - PGPOOL_USER_HBA_FILE=/config/pool_hba.conf
    depends_on:
      - postgres
      - postgres-replica
    ports:
      - "5434:5432"
    volumes:
      - ./infra/pgpool/pgpool-extra.conf:/config/pgpool-extra.conf:ro
      - ./infra/pgpool/pool_hba.conf:/config/pool_hba.conf:ro

  db-guard:
    image: public.ecr.aws/bitnami/pgpool:4.6.3
    command: bash /db-guard.sh
    environment:
      - PGPOOL_HOST=pgpool
      - PCP_USER=pgpooladmin
      - PCP_PASSWORD=pgpooladmin
      - PCP_NODE_REPLICA_ID=1
      - PRIMARY_HOST=postgres
      - PRIMARY_USER=postgres
      - PRIMARY_PASSWORD=postgres
      - SYNC_STANDBY_NAME=walreceiver
      - REPLAY_LAG_MAX_MS=1000
      - CHECK_INTERVAL_SECONDS=5
    depends_on:
      - pgpool
      - postgres
      - postgres-replica
    volumes:
      - ./infra/db-guard/db-guard.sh:/db-guard.sh:ro

volumes:
  # Explicit `name:` entries decouple volume identity from the compose project
  # name (i.e., from the directory name). Without them, Docker prefixes volumes
  # with `<project>_<short>` and a host-folder rename creates fresh empty
  # volumes, orphaning the data. With them, volume identity follows the
  # explicit name, so a folder rename is data-safe by construction.
  # See: brewery-pre-rename volume migration runbook (2026-05-18).
  pgdata:
    name: umbraculum_pgdata
  pgdata_replica:
    name: umbraculum_pgdata_replica
  wal_archive:
    name: umbraculum_wal_archive
  redisdata:
    name: umbraculum_redisdata
  web_node_modules:
    name: umbraculum_web_node_modules