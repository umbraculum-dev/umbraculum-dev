services:
  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  web:
    build: ./apps/web
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
    ports:
      - "3000:3000"

  api:
    build: ./services/api
    command: npm run dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/brewapp
      - STRIPE_WEBHOOK_SECRET=...
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=brewapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: